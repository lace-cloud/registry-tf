module:
  id: aws/iam/role_policy_attachment
  name: iam-role-policy-attachment
  system: aws
  version: 1.0.0
  description: "AWS IAM role policy attachment linking a role to a managed policy"
  categories:
    - iam
    - security
    - identity
  authors:
    - name: "Lace Team"
      email: "team@lace.cloud"
  registry_visibility: public
  example: |
    module "attachment" {
      source = "git::https://github.com/lace-cloud/registry-tf.git//modules/aws/iam/role_policy_attachment?ref=v1.0.0"

      role_name  = module.iam_role.name
      policy_arn = module.iam_policy.arn
    }

name: Gate

on:
  pull_request:
    branches: [main]

jobs:
  source-branch:
    name: Source Branch
    runs-on: ubuntu-latest
    steps:
      - name: Require develop as source branch
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::PRs to main must come from develop. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Source branch is develop — allowed"

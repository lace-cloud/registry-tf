name: PR Validate Modules

# Validates Terraform modules on PRs targeting develop/main
# No authentication needed — all validation is local/read-only

on:
  pull_request:
    branches: [develop, main]
    paths: ['modules/**']

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changed-modules:
    name: Detect Changed Modules
    runs-on: ubuntu-latest

    outputs:
      modules_json: ${{ steps.find-modules.outputs.modules_json }}
      modules_found: ${{ steps.find-modules.outputs.modules_found }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed module files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: modules/**

      - name: Find module roots
        id: find-modules
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]; then
            echo "No module changes detected"
            echo "modules_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          # Walk up from a file path to find the nearest directory containing module.yaml
          find_module_root() {
            local dir
            dir=$(dirname "$1")
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              [ -f "$dir/module.yaml" ] && { echo "$dir"; return 0; }
              [ "$dir" = "modules" ] && return 1
              dir=$(dirname "$dir")
            done
            return 1
          }

          module_dirs=""
          orphan_files=""
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if module_root=$(find_module_root "$file"); then
              module_dirs="$module_dirs$module_root"$'\n'
            else
              orphan_files="$orphan_files  - $file"$'\n'
            fi
          done

          # Fail if any changed files live outside a module directory
          if [ -n "$orphan_files" ]; then
            echo "::error::Files changed outside any module (no module.yaml found in parent directories):"
            echo "$orphan_files"
            exit 1
          fi

          unique_modules=$(echo "$module_dirs" | sort -u | sed '/^$/d')

          if [ -z "$unique_modules" ]; then
            echo "modules_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed modules:"
          echo "$unique_modules"

          modules_json=$(echo "$unique_modules" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules_json=$modules_json" >> $GITHUB_OUTPUT
          echo "modules_found=true" >> $GITHUB_OUTPUT

  validate-module:
    name: Validate Module
    runs-on: ubuntu-latest
    needs: detect-changed-modules
    if: needs.detect-changed-modules.outputs.modules_found == 'true'

    strategy:
      matrix:
        module_path: ${{ fromJson(needs.detect-changed-modules.outputs.modules_json) }}
      fail-fast: false

    env:
      MODULE_PATH: ${{ matrix.module_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate module structure and metadata
        id: meta
        run: |
          errors=()

          # Required files
          [ ! -f "$MODULE_PATH/module.yaml" ] && errors+=("module.yaml not found in $MODULE_PATH")
          [ ! -f "$MODULE_PATH/main.tf" ] && errors+=("main.tf not found in $MODULE_PATH")

          if [ ${#errors[@]} -gt 0 ]; then
            printf '::error::%s\n' "${errors[@]}"
            exit 1
          fi

          # Extract fields (awk finds first matching line, prints value)
          field() { awk "/$1:/"' {print $2; exit}' "$MODULE_PATH/module.yaml"; }

          ID=$(field "id")
          NAME=$(field "name")
          VERSION=$(field "version")
          VISIBILITY=$(field "registry_visibility")

          # Required fields
          [ -z "$ID" ] && errors+=("Missing required field: id")
          [ -z "$NAME" ] && errors+=("Missing required field: name")
          [ -z "$VERSION" ] && errors+=("Missing required field: version")
          [ -z "$VISIBILITY" ] && errors+=("Missing required field: registry_visibility")

          # Visibility must be public (this is the public registry)
          [ -n "$VISIBILITY" ] && [ "$VISIBILITY" != "public" ] && \
            errors+=("registry_visibility must be 'public', got '$VISIBILITY'")

          if [ ${#errors[@]} -gt 0 ]; then
            printf '::error::%s\n' "${errors[@]}"
            exit 1
          fi

          echo "module_id=$ID" >> $GITHUB_OUTPUT
          echo "module_name=$NAME" >> $GITHUB_OUTPUT
          echo "module_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Valid: id=$ID name=$NAME version=$VERSION visibility=$VISIBILITY"

      - name: Check uniqueness
        run: |
          ID="${{ steps.meta.outputs.module_id }}"
          NAME="${{ steps.meta.outputs.module_name }}"
          errors=()

          while IFS= read -r yaml_file; do
            dir=$(dirname "$yaml_file")
            [ "$dir" = "$MODULE_PATH" ] && continue

            file_id=$(awk '/id:/ {print $2; exit}' "$yaml_file")
            file_name=$(awk '/name:/ {print $2; exit}' "$yaml_file")

            [ "$file_id" = "$ID" ] && errors+=("Duplicate id '$ID' in $dir")
            [ "$file_name" = "$NAME" ] && errors+=("Duplicate name '$NAME' in $dir")
          done < <(find modules -name "module.yaml" -type f)

          if [ ${#errors[@]} -gt 0 ]; then
            printf '::error::%s\n' "${errors[@]}"
            exit 1
          fi

          echo "Module id and name are unique"

      - name: Check version bump
        run: |
          VERSION="${{ steps.meta.outputs.module_version }}"

          BASE_VERSION=$(git show "origin/${{ github.event.pull_request.base.ref }}:$MODULE_PATH/module.yaml" 2>/dev/null \
            | awk '/version:/ {print $2; exit}' || true)

          if [ -z "$BASE_VERSION" ]; then
            echo "New module — skipping version bump check"
          elif [ "$VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version not bumped (still $VERSION). Update version in module.yaml."
            exit 1
          else
            echo "Version: $BASE_VERSION -> $VERSION"
          fi

      - name: Install Lace CLI
        run: |
          wget -q https://releases.lace.cloud/lace-cli-linux-amd64 -O lace
          chmod +x lace
          sudo mv lace /usr/local/bin/lace
          lace --version || echo "Lace CLI ready"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Format Check
        run: lace terraform fmt --check --path "$MODULE_PATH"

      - name: Terraform Validate
        run: lace terraform validate --path "$MODULE_PATH"

      - name: Terraform Security Scan
        run: lace terraform scan --path "$MODULE_PATH" --soft-fail || true
        continue-on-error: true

      - name: Parse Module
        run: lace module parse --path "$MODULE_PATH"

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [detect-changed-modules, validate-module]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Terraform Module Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.detect-changed-modules.outputs.modules_found }}" != "true" ]; then
            echo "No module changes detected in this PR." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## Modules Validated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.detect-changed-modules.outputs.modules_json }}' | jq -r '.[] | "- `" + . + "`"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          RESULT="${{ needs.validate-module.result }}"
          case "$RESULT" in
            success) echo "**Result:** All modules passed validation" >> $GITHUB_STEP_SUMMARY ;;
            failure) echo "**Result:** One or more modules failed validation" >> $GITHUB_STEP_SUMMARY ;;
            *)       echo "**Result:** $RESULT" >> $GITHUB_STEP_SUMMARY ;;
          esac
